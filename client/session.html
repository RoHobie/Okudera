<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Okudera</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: monospace;
      background: #0f0f0f;
      color: #eee;
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr auto;
      grid-template-columns: 1fr 320px;
      grid-template-areas:
        "header header"
        "main   sidebar"
        "main   sidebar";
    }

    header {
      grid-area: header;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 2rem;
      border-bottom: 1px solid #222;
    }

    header h1 {
      font-size: 1.2rem;
      letter-spacing: 4px;
    }

    .room-code {
      color: #555;
      font-size: 0.85rem;
    }

    .badge {
      background: #1a1a1a;
      border: 1px solid #333;
      padding: 0.3rem 0.8rem;
      border-radius: 4px;
      font-size: 0.8rem;
      color: #aaa;
    }

    main {
      grid-area: main;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2rem;
      padding: 2rem;
    }

    .timer-display {
      font-size: 6rem;
      letter-spacing: 12px;
      font-weight: bold;
      color: #fff;
      transition: color 0.3s;
    }

    .timer-display.paused {
      color: #555;
    }

    .timer-display.done {
      color: #e74c3c;
    }

    .timer-set {
      display: flex;
      gap: 0.5rem;
      align-items: center;
    }

    .timer-set input {
      background: #1a1a1a;
      border: 1px solid #333;
      color: #eee;
      padding: 0.5rem 0.8rem;
      border-radius: 4px;
      font-family: monospace;
      font-size: 1rem;
      width: 80px;
      text-align: center;
    }

    .timer-set span {
      color: #555;
    }

    .controls {
      display: flex;
      gap: 1rem;
    }

    button {
      background: #1a1a1a;
      border: 1px solid #333;
      color: #eee;
      padding: 0.6rem 1.4rem;
      border-radius: 4px;
      font-family: monospace;
      font-size: 0.95rem;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
    }

    button:hover {
      background: #252525;
      border-color: #555;
    }

    button.primary {
      background: #eee;
      color: #0f0f0f;
      border-color: #eee;
    }

    button.primary:hover {
      background: #ccc;
    }

    button:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }

    /* sidebar */
    aside {
      grid-area: sidebar;
      border-left: 1px solid #222;
      display: flex;
      flex-direction: column;
    }

    .sidebar-section {
      padding: 1rem;
      border-bottom: 1px solid #222;
      font-size: 0.75rem;
      color: #555;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
    }

    .msg {
      font-size: 0.85rem;
      line-height: 1.4;
    }

    .msg .who {
      color: #888;
      margin-right: 0.4rem;
    }

    .msg.system {
      color: #4caf50;
      font-size: 0.8rem;
    }

    .msg.done-msg {
      color: #e74c3c;
    }

    .chat-input {
      display: flex;
      border-top: 1px solid #222;
      padding: 0.75rem;
      gap: 0.5rem;
    }

    .chat-input input {
      flex: 1;
      background: #1a1a1a;
      border: 1px solid #333;
      color: #eee;
      padding: 0.5rem 0.8rem;
      border-radius: 4px;
      font-family: monospace;
      font-size: 0.85rem;
    }

    .chat-input button {
      padding: 0.5rem 0.8rem;
      font-size: 0.85rem;
    }
  </style>
</head>

<body>

  <header>
    <h1>OKUDERA</h1>
    <div class="room-code">room: <span id="room-code"></span></div>
    <div class="badge" id="status">idle</div>
  </header>

  <main>
    <div class="timer-display" id="timer">00:00</div>

    <div class="timer-set">
      <input id="minutes" type="number" min="0" max="99" value="25" placeholder="mm" />
      <span>:</span>
      <input id="seconds-input" type="number" min="0" max="59" value="0" placeholder="ss" />
      <button onclick="setTimer()">Set</button>
    </div>

    <div class="controls">
      <button id="btn-start" onclick="timerAction('start')">Start</button>
      <button id="btn-pause" onclick="timerAction('pause')">Pause</button>
      <button id="btn-reset" onclick="timerAction('reset')">Reset</button>
    </div>
  </main>

  <aside>
    <div class="sidebar-section">activity</div>
    <div class="chat-messages" id="messages"></div>
    <div class="chat-input">
      <input id="chat-input" placeholder="say something..." onkeydown="if(event.key==='Enter') sendMessage()" />
      <button onclick="sendMessage()">→</button>
    </div>
  </aside>

  <script>
    const params = new URLSearchParams(window.location.search)
    const code = params.get("code")
    const userID = localStorage.getItem("user_id")
    const name = localStorage.getItem("name")

    document.getElementById("room-code").textContent = code

    // ── SSE ──────────────────────────────────────────────
    const stream = new EventSource(`/api/v1/stream?code=${code}&user_id=${userID}`)

    stream.onmessage = (e) => {
      const event = JSON.parse(e.data)
      switch (event.Type) {
        case "timer_tick":
        case "timer_state":
          updateTimer(event.Data.remaining, event.Data.state)
          break
        case "timer_done":
          updateTimer(0, "done")
          addMessage("⏱ time's up!", "done-msg")
          break
        case "user_joined":
          addMessage(`${event.Data.name} joined`, "system")
          break
        case "chat_message":
          addMessage(event.Data.text, "", event.Data.name)
          break
        case "session_snapshot":
          updateTimer(event.Data.timer.remaining, event.Data.timer.state)
          if (event.Data.chat) {
            event.Data.chat.forEach(msg => {
              addMessage(msg.Text, "", msg.Name)
            })
          }
          break
      }
    }

    stream.onerror = () => addMessage("connection lost, retrying...", "system")

    // ── Timer ─────────────────────────────────────────────
    function updateTimer(remaining, state) {
      const m = Math.floor(remaining / 60).toString().padStart(2, "0")
      const s = (remaining % 60).toString().padStart(2, "0")
      const el = document.getElementById("timer")
      el.textContent = `${m}:${s}`
      el.className = `timer-display ${state === "paused" ? "paused" : state === "done" ? "done" : ""}`
      document.getElementById("status").textContent = state
    }

    async function setTimer() {
      const m = parseInt(document.getElementById("minutes").value) || 0
      const s = parseInt(document.getElementById("seconds-input").value) || 0
      const total = m * 60 + s
      if (total <= 0) return

      await fetch(`/api/v1/sessions/${code}/timer`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ seconds: total, user_id: userID })
      })
    }

    async function timerAction(action) {
      await fetch(`/api/v1/sessions/${code}/timer/${action}`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ user_id: userID })
      })
    }

    // ── Chat ──────────────────────────────────────────────
    async function sendMessage() {
      const input = document.getElementById("chat-input")
      const text = input.value.trim()
      if (!text) return
      input.value = ""

      await fetch(`/api/v1/sessions/${code}/messages`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ user_id: userID, name, text })
      })
    }

    function addMessage(text, cls, who) {
      const el = document.getElementById("messages")
      const div = document.createElement("div")
      div.className = `msg ${cls || ""}`
      div.innerHTML = who ? `<span class="who">${who}</span>${text}` : text
      el.appendChild(div)
      el.scrollTop = el.scrollHeight
    }
  </script>

</body>

</html>
