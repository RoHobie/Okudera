<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Okudera</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: monospace; background: #0f0f0f; color: #eee; 
           display: flex; flex-direction: column; align-items: center; 
           justify-content: center; height: 100vh; gap: 2rem; }
    h1 { font-size: 2rem; letter-spacing: 4px; }
    .card { background: #1a1a1a; border: 1px solid #333; border-radius: 8px;
            padding: 2rem; width: 320px; display: flex; flex-direction: column; gap: 1rem; }
    input { background: #0f0f0f; border: 1px solid #444; color: #eee; 
            padding: 0.6rem 1rem; border-radius: 4px; font-family: monospace; font-size: 1rem; }
    button { background: #eee; color: #0f0f0f; border: none; padding: 0.6rem 1rem;
             border-radius: 4px; font-family: monospace; font-size: 1rem; cursor: pointer; }
    button:hover { background: #ccc; }
    .divider { text-align: center; color: #555; }
  </style>
</head>
<body>
  <h1>OKUDERA</h1>

  <div class="card">
    <b>Create a session</b>
    <input id="create-name" placeholder="Your name" />
    <button onclick="createSession()">Create</button>
  </div>

  <div class="divider">— or —</div>

  <div class="card">
    <b>Join a session</b>
    <input id="join-name" placeholder="Your name" />
    <input id="join-code" placeholder="Room code" maxlength="6" style="text-transform:uppercase" />
    <button onclick="joinSession()">Join</button>
  </div>

  <script>
    async function createSession() {
      const name = document.getElementById("create-name").value.trim()
      if (!name) return alert("enter a name")

      const res = await fetch("/api/v1/sessions", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ name })
      })
      const data = await res.json()
      localStorage.setItem("user_id", data.user_id)
      localStorage.setItem("name", name)
      window.location.href = `/session.html?code=${data.code}`
    }

    async function joinSession() {
      const name = document.getElementById("join-name").value.trim()
      const code = document.getElementById("join-code").value.trim().toUpperCase()
      if (!name || !code) return alert("enter name and code")

      const res = await fetch(`/api/v1/sessions/${code}/join`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ name })
      })
      const data = await res.json()
      localStorage.setItem("user_id", data.user_id)
      localStorage.setItem("name", name)
      window.location.href = `/session.html?code=${code}`
    }
  </script>
</body>
</html>
